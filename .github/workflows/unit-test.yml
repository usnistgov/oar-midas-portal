name: Angular Tests

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build oarng lib
      run: npm run build-lib

    - name: Lint
      run: npm run lint --workspace=midas-portal

    - name: Run tests with coverage
      run: npm run test:ci --workspace=midas-portal

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./midas-portal/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Coverage Summary
      run: |
        echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Percentage |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
        if [ -f ./midas-portal/coverage/coverage-summary.json ]; then
          node -e "
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./midas-portal/coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;
            console.log('| Statements | ' + total.statements.pct + '% |');
            console.log('| Branches | ' + total.branches.pct + '% |');
            console.log('| Functions | ' + total.functions.pct + '% |');
            console.log('| Lines | ' + total.lines.pct + '% |');
          " >> $GITHUB_STEP_SUMMARY
        fi

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('./midas-portal/coverage/coverage-summary.json')) {
            const coverage = JSON.parse(fs.readFileSync('./midas-portal/coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;

            const comment = `## Test Coverage Report

            | Metric | Current | Target |
            |--------|---------|--------|
            | Statements | ${total.statements.pct}% | 80% |
            | Branches | ${total.branches.pct}% | 80% |
            | Functions | ${total.functions.pct}% | 80% |
            | Lines | ${total.lines.pct}% | 80% |

            ${total.statements.pct < 80 ? '⚠️ Statement coverage below 80%' : '✅ Statement coverage looks good!'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build oarng lib
      run: npm run build-lib

    - name: Build production
      working-directory: ./midas-portal
      run: npx ng build --configuration production

    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: midas-portal-dist
        path: midas-portal/dist/
        retention-days: 7
