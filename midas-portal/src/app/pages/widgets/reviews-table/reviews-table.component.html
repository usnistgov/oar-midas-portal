<div class="table-controls">
  <mat-form-field appearance="outline" class="filter small">
    <mat-icon matPrefix aria-hidden="true">search</mat-icon>
    <input matInput #filterInput
           (keyup)="applyFilter($event)"
           placeholder="Filter name, owner or contact…"
           aria-label="Filter reviews table by title, submitter or reviewer" />
    <mat-icon matSuffix
              class="clear-icon"
              *ngIf="filterInput.value"
              (click)="clearFilter(filterInput)"
              matTooltip="Clear Input"
              aria-hidden="true">
      close
    </mat-icon>
  </mat-form-field>
</div>
<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="table"
         aria-label="Reviews table with sortable columns">

    <!-- Name Column -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
      <td mat-cell *matCellDef="let d">
        <a [href]="linkto(d.id)" target="_blank">{{ d.title }}</a>
      </td>
    </ng-container>

    <!-- Owner Column -->
    <ng-container matColumnDef="submitterName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Submitter Name </th>
      <td mat-cell *matCellDef="let d">{{ d.submitterName }}</td>
    </ng-container>

    <!-- Primary Contact Column -->
    <ng-container matColumnDef="currentReviewer">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Current Reviewer
      </th>
      <td mat-cell *matCellDef="let d">{{ d.currentReviewer }}</td>
    </ng-container>

    <!-- Modified Date Column -->
    <ng-container matColumnDef="currentReviewStep">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Current Review Step
      </th>
      <td mat-cell *matCellDef="let d">{{ d.currentReviewStep }}</td>
    </ng-container>

    <!-- Header and Row Declarations -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<mat-paginator [length]="length()" [pageSizeOptions]="pageSizeOptions" showFirstLastButtons [pageSize]="pageSize">
</mat-paginator>

<!-- overlay with spinner -->
<div class="overlay" *ngIf="isLoading()" role="status" aria-live="polite" aria-label="Loading reviews">
  <mat-progress-spinner mode="indeterminate" diameter="50" aria-label="Loading"></mat-progress-spinner>
</div>
