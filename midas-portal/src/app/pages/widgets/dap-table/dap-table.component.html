<div class="table-controls">
  <mat-form-field appearance="outline" class="filter small">
    <mat-icon matPrefix aria-hidden="true">search</mat-icon>
    <input matInput #filterInput
           (keyup)="applyFilter($event)"
           placeholder="Filter name, owner or contact…"
           aria-label="Filter DAP table by name, owner or contact" />
    <mat-icon matSuffix
              class="clear-icon"
              *ngIf="filterInput.value"
              (click)="clearFilter(filterInput)"
              matTooltip="Clear Input"
              aria-hidden="true">
      close
    </mat-icon>
  </mat-form-field>

  <button mat-flat-button color="primary" (click)="createDap()">
    <mat-icon aria-hidden="true">add</mat-icon>
    Create
  </button>

</div>
<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="table"
         aria-label="Data Asset Plans table with sortable columns">

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let d">
        <a [href]="linkto(d.id)" target="_blank">{{ d.name }}</a>
      </td>
    </ng-container>

    <!-- Owner Column -->
    <ng-container matColumnDef="owner">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Owner </th>
      <td mat-cell *matCellDef="let d">{{ d.owner }}</td>
    </ng-container>

    <!-- Primary Contact Column -->
    <ng-container matColumnDef="primaryContact">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Primary Contact
      </th>
      <td mat-cell *matCellDef="let d">{{ d.primaryContact }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Status
      </th>
      <td mat-cell *matCellDef="let d">
          <span class="status-chip" [ngClass]="getStatusClass(d.status)">
              {{ d.status?.toUpperCase() || '-' }}
          </span>
      </td>
      
    </ng-container>

    <!-- Modified Date Column -->
    <ng-container matColumnDef="modifiedDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Last Modified
      </th>
      <td mat-cell *matCellDef="let d">
        {{ d.modifiedDate | date:'MM/dd/yyyy' }}
      </td>
    </ng-container>

    <!-- Header and Row Declarations -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<mat-paginator [length]="length()" [pageSizeOptions]="pageSizeOptions" showFirstLastButtons [pageSize]="pageSize">
</mat-paginator>

<!-- overlay with spinner -->
<div class="overlay" *ngIf="isLoading()" role="status" aria-live="polite" aria-label="Loading Data Asset Plans">
  <mat-progress-spinner mode="indeterminate" diameter="50" aria-label="Loading"></mat-progress-spinner>
</div>
