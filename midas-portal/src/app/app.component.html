<!-- Skip to main content link for 508 compliance -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="layout-container">
  <app-header appVersion="1.0" titleLn1="MIDAS" titleLn2="Dashboard"></app-header>

  <!-- Scrollable wrapper for sidenav + content + footer -->
  <div class="main-scroll-area">
    <!-- Main Layout -->
    <mat-sidenav-container>
      <mat-sidenav
        opened
        mode="side"
        [style.width]="customSidenav?.sideNavWidth()"
        class="hover-sidenav"
      >
        <app-custom-sidenav #customSidenav></app-custom-sidenav>
      </mat-sidenav>
      <mat-sidenav-content class="content" [style.margin-left]="customSidenav?.sideNavWidth()">
        <main id="main-content" role="main" tabindex="-1">
          <router-outlet></router-outlet>
        </main>
      </mat-sidenav-content>
    </mat-sidenav-container>

    <app-footer></app-footer>
  </div>
</div>
