<div id="footer" class="region region-footer ">
    <div class="footer__inner">
        <!-- Social Media list -->
        <div class="social-links" *ngIf="socialMediaList">
            <div class="item-list">
                <ul>
                    <li *ngFor="let socialMedia of socialMediaList">
                        <a [href]="socialMedia.url" target="_blank" rel="noopener" class="social-btn social-btn--large extlink ext" [attr.aria-label]="socialMedia.name + ' (opens in new tab)'"><i [class]="socialMedia.icon" aria-hidden="true"><span
                            class="element-invisible">{{socialMedia.name}}</span></i><span class="ext" aria-hidden="true"><span class="element-invisible"> (link
                            is external)</span></span></a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Footer logo -->
        <div class="footer__logo">
            <a href="https://www.nist.gov" target="_blank" rel="noopener" title="National Institute of Standards and Technology" class="footer__logo-link" aria-label="NIST homepage (opens in new tab)">
                <img id="logo" src="./assets/images/nist_logo_rev.png" alt="National Institute of Standards and Technology" title="National Institute of Standards and Technology">
            </a>
        </div>


        <!-- Footer links line #1 -->
        <nav id="block-menu-menu-footer-menu" *ngIf="footerLinks01"
        class="block menu--footer-menu first even block--menu block--menu-menu-footer-menu" aria-label="Footer navigation links">
            <ul class="menu">
                <li *ngFor="let link of footerLinks01; let i = index" [ngClass]="getLinkClass(i, footerLinks01)">
                    <a [href]="link.url" target="_blank" rel="noopener" class="menu__link" [attr.aria-label]="link.title + ' (opens in new tab)'">{{link.title}} </a>
                </li>
            </ul>
        </nav>

        <!-- Footer links line #2 -->
        <nav id="block-menu-menu-footer-menu-3" *ngIf="footerLinks02"
        class="block menu--footer-menu last even block--menu block--menu-menu-footer-menu-3" aria-label="Additional footer navigation">
            <ul class="menu">
                <li *ngFor="let link of footerLinks02; let i = index" [ngClass]="getLinkClass(i, footerLinks02)">
                    <a [href]="link.url" target="_blank" rel="noopener" class="menu__link" [attr.aria-label]="link.title + ' (opens in new tab)'">{{link.title}} </a>
                </li>
            </ul>
        </nav>
    </div>
</div>
